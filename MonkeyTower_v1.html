// Perk variants — SVG data URLs styled to match the blue/gold perk frame
const perkFrame = (inner) => {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
      <radialGradient id="bg" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#60c8ff"/>
        <stop offset="100%" stop-color="#1a6fd4"/>
      </radialGradient>
      <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffd966"/>
        <stop offset="100%" stop-color="#e6900a"/>
      </linearGradient>
    </defs>
    <rect x="4" y="4" width="92" height="92" rx="22" fill="url(#frame)"/>
    <rect x="8" y="8" width="84" height="84" rx="18" fill="url(#bg)"/>
    ${inner}
  </svg>`;
  return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
};

const IMG_PERK_LIGHTNING = perkFrame(`<text x="50" y="68" font-size="52" text-anchor="middle" font-family="Arial">⚡</text>`);
const IMG_PERK_STAR      = perkFrame(`<text x="50" y="68" font-size="48" text-anchor="middle" font-family="Arial">⭐</text>`);

function rewardImg(key) {
  switch(key) {
    case "spins":         return IMG_SPIN;
    case "gold_s":
    case "gold_l":        return IMG_COIN;
    case "common":
    case "rare":          return IMG_STICKER_LOW;
    case "epic":          return IMG_STICKER_MID;
    case "legendary":
    case "special":       return IMG_STICKER_HIGH;
    case "d1":            return IMG_BOOSTER_GOLD;
    case "d3":            return IMG_BOOSTER_DIAMOND;
    case "d_leg":         return IMG_BOOSTER_LEGEND;
    case "d_se":          return IMG_BOOSTER_SE;
    case "perk":          return IMG_PERK;
    case "perk_lightning":return IMG_PERK_LIGHTNING;
    case "perk_star":     return IMG_PERK_STAR;
    default:              return IMG_PERK;
  }
}

function needsBlend(key) {
  return ["common","rare","epic","legendary","special","d1","d3","d_leg","d_se","perk","perk_lightning","perk_star","spins"].includes(key);
}

const TOTAL_FLOORS   = 30;
const JACKPOT_FLOORS = new Set([5, 10, 15, 20, 25, 30]);
const SAFE_FLOORS    = 5;
const skulls = f => (f <= SAFE_FLOORS || JACKPOT_FLOORS.has(f)) ? 0 : f <= 20 ? 1 : 2;

const REWARDS = {
  common:         { label:"Sticker",           rarity:"COMMON",    col:"#4ade80" },
  rare:           { label:"Rare Sticker",       rarity:"RARE",      col:"#60a5fa" },
  epic:           { label:"Seasonal Sticker",   rarity:"SEASONAL",  col:"#fb923c" },
  legendary:      { label:"Diamond Sticker",    rarity:"DIAMOND",   col:"#c084fc" },
  special:        { label:"Diamond Sticker",    rarity:"DIAMOND",   col:"#c084fc" },
  gold_s:         { label:"500 Coins",          rarity:"COINS",     col:"#fbbf24" },
  gold_l:         { label:"2,000 Coins",        rarity:"COINS",     col:"#f59e0b" },
  d1:             { label:"Gold Booster",       rarity:"BOOSTER",   col:"#fbbf24" },
  d3:             { label:"Diamond Booster",    rarity:"BOOSTER",   col:"#e879f9" },
  d_leg:          { label:"Legendary Booster",  rarity:"LEGENDARY", col:"#a78bfa" },
  d_se:           { label:"Legendary Booster",  rarity:"LEGENDARY", col:"#a78bfa" },
  perk:           { label:"Scarab Perk",        rarity:"PERK",      col:"#38bdf8" },
  perk_lightning: { label:"Lightning Perk",     rarity:"PERK",      col:"#38bdf8" },
  perk_star:      { label:"Star Perk",          rarity:"PERK",      col:"#38bdf8" },
  spins:          { label:"Spins",              rarity:"SPINS",     col:"#d8b4fe" },
};

const POOL = (f, j) => {
  if (j) {
    if (f <= 5)  return ["d1","gold_l","rare","spins"];
    if (f <= 10) return ["d3","gold_l","epic","perk"];
    if (f <= 15) return ["d3","d_leg","epic","perk_lightning"];
    if (f <= 20) return ["d_leg","legendary","perk_lightning"];
    if (f <= 25) return ["d_leg","d_se","legendary","perk_star"];
    return              ["d_se","special","perk_star"];
  }
  if (f<=5)  return ["common","gold_s","spins","d1"];
  if (f<=10) return ["rare","gold_s","d1","spins","perk"];
  if (f<=20) return ["epic","gold_l","d3","perk_lightning"];
  return            ["legendary","gold_l","d_leg","d_se","perk_star"];
};

const pick = a => a[Math.floor(Math.random() * a.length)];
const shuffle = a => { const r=[...a]; for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];} return r; };

function buildCards(f) {
  const j=JACKPOT_FLOORS.has(f), sk=skulls(f), pool=POOL(f,j);
  return shuffle([
    ...Array.from({length:4-sk},()=>({type:"reward",key:pick(pool)})),
    ...Array.from({length:sk},    ()=>({type:"skull"})),
  ]);
}

const JJ = f => {
  if (JACKPOT_FLOORS.has(f)) return { face:"🤩", msg:"JACKPOT FLOOR!",   bg:"#78350f" };
  if (f <= SAFE_FLOORS)      return { face:"🐵", msg:"Safe — no skulls!", bg:"#064e3b" };
  if (f <= 8)                return { face:"😬", msg:"Skulls lurking…",   bg:"#365314" };
  if (f <= 14)               return { face:"😈", msg:"Getting risky!",    bg:"#7c2d12" };
  if (f <= 20)               return { face:"🤑", msg:"Big rewards!",      bg:"#713f12" };
  if (f <= 26)               return { face:"😰", msg:"DANGER ZONE!",      bg:"#7f1d1d" };
  return                            { face:"🔥", msg:"TOP OF TOWER!",     bg:"#7c2d12" };
};

function groupLoot(collected) {
  const g = {};
  collected.forEach(r => {
    if (!g[r.key]) g[r.key] = { ...REWARDS[r.key], count:0 };
    g[r.key].count++;
  });
  return g;
}

// next jackpot floor from current
function nextJackpotFloor(floor) {
  const jf = [5,10,15,20,25,30];
  return jf.find(f => f > floor) || null;
}

// pre-generate cards for all jackpot floors from a given floor onwards
function pregenJackpots(fromFloor) {
  const jc = {};
  [5,10,15,20,25,30].forEach(f => { if (f >= fromFloor) jc[f] = buildCards(f); });
  return jc;
}

  return (
    <div style={{
      background:"rgba(0,0,0,.55)",borderBottom:"1px solid rgba(251,191,36,.15)",
      padding:"9px 12px",flexShrink:0,minHeight:64,

        <span style={{fontSize:9,color:"rgba(255,255,255,.3)",fontWeight:900,letterSpacing:".15em",flexShrink:0}}>YOUR BAG</span>
        {collected.length===0 ? (

            flexShrink:0,background:`${g.col}20`,border:`2px solid ${g.col}88`,
            borderRadius:10,padding:"4px 10px 4px 4px",
            display:"flex",alignItems:"center",gap:3,boxShadow:`0 0 10px ${g.col}44`,
          }}>
            <div style={{width:40,height:40,background:"#000",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
              <RewardImg rkey={key} size={38}/>
            </div>
            {g.count>1 && <span className="jf" style={{fontSize:16,color:g.col,lineHeight:1,paddingLeft:2}}>×{g.count}</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── JACKPOT TEASER ───────────────────────────────────────────────────────────

function JackpotTeaser({ floor, jackpotCards={} }) {
  const isOnJackpot = JACKPOT_FLOORS.has(floor);
  const njf = isOnJackpot ? floor : nextJackpotFloor(floor);
  if (!njf) return null;
  const floorsAway = njf - floor;

  // Always derive from the same pre-generated cards for that jackpot floor
  // so teaser is identical before and on the floor
  const targetCards = jackpotCards[njf] || [];
  const seenImgs = new Set();
  const unique = [];
  targetCards.filter(c => c.type==="reward").forEach(c => {
    const img = rewardImg(c.key);
    if (!seenImgs.has(img)) { seenImgs.add(img); unique.push(c.key); }
  });
  const urgent = !isOnJackpot && floorsAway === 1;

  return (
    <div className={isOnJackpot?"jgl":"" + urgent?" jtease":""} style={{
      margin:"0 12px",
      background: isOnJackpot ? "rgba(251,191,36,.14)" : urgent ? "rgba(251,191,36,.1)" : "rgba(251,191,36,.05)",
      border:`1px solid ${isOnJackpot?"rgba(251,191,36,.7)":urgent?"rgba(251,191,36,.55)":"rgba(251,191,36,.22)"}`,
      borderRadius:12,padding:"8px 12px",
      display:"flex",alignItems:"center",gap:10,
    }}>
      <div style={{flexShrink:0}}>
        <div style={{fontSize:9,color:"#f59e0b",fontWeight:900,letterSpacing:".08em",marginBottom:1}}>
          {isOnJackpot ? "⭐ THIS FLOOR'S REWARDS" : urgent ? "⭐ JACKPOT NEXT FLOOR!" : `⭐ JACKPOT IN ${floorsAway} FLOORS`}
        </div>
        <div style={{fontSize:10,color:"rgba(255,255,255,.45)"}}>
          {isOnJackpot ? "One of these is in your chest" : `Floor ${njf} rewards:`}
        </div>
      </div>
      <div style={{display:"flex",gap:5,marginLeft:"auto",alignItems:"center"}}>
        {unique.map(key=>(
          <div key={key} style={{
            width:isOnJackpot?40:34,
            height:isOnJackpot?40:34,
            background:"rgba(0,0,0,.6)",borderRadius:8,
            display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",
            border:`1px solid ${isOnJackpot?"rgba(251,191,36,.55)":"rgba(251,191,36,.3)"}`,
            flexShrink:0,
            boxShadow:isOnJackpot?"0 0 8px rgba(251,191,36,.3)":"none",
          }}>
            <RewardImg rkey={key} size={isOnJackpot?36:30}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── CHEST CARD ───────────────────────────────────────────────────────────────

function ChestCard({ card, isRevealed, isFlipping, isOff, isChosen, isMissed, isPeeked, onClick }) {
  const isSk = isRevealed && card?.type==="skull";
  const rkey = isRevealed && card?.type==="reward" ? card.key : null;
  const r    = rkey ? REWARDS[rkey] : null;

  const face = isRevealed ? (
    isSk ? (
      <div className={isMissed?"jmp":"jshk"} style={{
        width:"100%",height:"100%",
        background:"linear-gradient(145deg,#7f1d1d,#450a0a)",
        border:"3px solid #ef4444",borderRadius:14,
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,
        boxShadow:"0 0 24px #ef444499",
        opacity: isMissed ? 0.82 : 1,
      }}>
        <div style={{fontSize:44}}>💀</div>
        <div style={{fontSize:9,fontWeight:900,color:"#fca5a5",letterSpacing:".13em"}}>
          {isMissed ? "dodged!" : "SKULL!"}
        </div>
      </div>
    ) : (
      <div className={isMissed?"jmp":"jp"} style={{
        width:"100%",height:"100%",
        background:`linear-gradient(145deg,${r.col}2e,${r.col}0f)`,
        border:`3px solid ${isChosen ? r.col : r.col+"88"}`,borderRadius:14,
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,
        boxShadow: isChosen ? `0 0 20px ${r.col}77` : `0 0 8px ${r.col}33`,
        opacity: isMissed ? 0.78 : 1,
      }}>
        <div style={{background:"#000",borderRadius:10,padding:3,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <RewardImg rkey={rkey} size={isMissed?44:56}/>
        </div>
        <div style={{fontSize:9,fontWeight:900,color: isMissed ? r.col+"aa" : r.col,letterSpacing:".1em"}}>{r.rarity}</div>
      </div>
    )
  ) : (
    <div style={{
      width:"100%",height:"100%",
      background:"linear-gradient(145deg,#1a0533,#2e0d5c)",
      border:"3px solid #7c3aed",borderRadius:14,
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,
      boxShadow:"inset 0 2px 10px rgba(167,139,250,.15),0 4px 14px rgba(0,0,0,.6)",
      position:"relative",overflow:"hidden",
    }}>
      <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle,rgba(124,58,237,.18) 1px,transparent 1px)",backgroundSize:"11px 11px",pointerEvents:"none"}}/>
      <div className="jf" style={{fontSize:46,color:"#a78bfa",lineHeight:1,textShadow:"0 0 18px rgba(167,139,250,.7)"}}>?</div>
      <div style={{fontSize:9,fontWeight:900,color:"rgba(167,139,250,.5)",letterSpacing:".13em"}}>TAP</div>
    </div>
  );

  // Peeked: show content with teal styling, eye badge, but not "chosen"
  const peekedRkey = isPeeked && card?.type==="reward" ? card.key : null;
  const peekedR = peekedRkey ? REWARDS[peekedRkey] : null;
  const peekedFace = isPeeked ? (
    card?.type==="skull" ? (
      <div style={{width:"100%",height:"100%",background:"linear-gradient(145deg,#7f1d1d,#450a0a)",border:"3px solid #06b6d4",borderRadius:14,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,boxShadow:"0 0 18px rgba(6,182,212,.5)"}}>
        <div style={{fontSize:40}}>💀</div>
        <div style={{fontSize:9,fontWeight:900,color:"#67e8f9",letterSpacing:".1em"}}>SKULL</div>
        <div style={{position:"absolute",top:6,right:6,fontSize:12}}>👁️</div>
      </div>
    ) : (
      <div style={{width:"100%",height:"100%",background:`linear-gradient(145deg,${peekedR.col}22,${peekedR.col}08)`,border:"3px solid #06b6d4",borderRadius:14,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,boxShadow:"0 0 18px rgba(6,182,212,.5)",position:"relative"}}>
        <div style={{background:"#000",borderRadius:10,padding:3,display:"flex",alignItems:"center",justifyContent:"center"}}><RewardImg rkey={peekedRkey} size={52}/></div>
        <div style={{fontSize:9,fontWeight:900,color:"#67e8f9",letterSpacing:".1em"}}>{peekedR.rarity}</div>
        <div style={{position:"absolute",top:6,right:6,fontSize:12}}>👁️</div>
      </div>
    )
  ) : null;

  return (
    <div
      className={`jcard${isOff?" joff":""}${isFlipping?" jshk":""}`}
      onClick={onClick}
      style={{width:"100%",aspectRatio:"1"}}
    >{isPeeked ? peekedFace : face}</div>
  );
}

// ─── TOWER SIDEBAR ────────────────────────────────────────────────────────────

function TowerBar({ floor, onDevJump }) {
  const ref = useRef(null);
  useEffect(()=>{ ref.current?.scrollIntoView({behavior:"smooth",block:"center"}); },[floor]);
  return (
    <div className="jsc" style={{
      width:48,flexShrink:0,background:"rgba(0,0,0,.48)",
      borderLeft:"1px solid rgba(251,191,36,.1)",overflowY:"auto",
      display:"flex",flexDirection:"column",alignItems:"center",padding:"5px 0",gap:2,
    }}>
      <div style={{fontSize:7,fontWeight:900,color:"#f59e0b",background:"rgba(245,158,11,.14)",borderRadius:3,padding:"2px 4px",letterSpacing:".05em",marginBottom:1}}>DEV</div>
      <div style={{fontSize:7,color:"rgba(255,255,255,.2)",marginBottom:2}}>tap →</div>
      {Array.from({length:TOTAL_FLOORS},(_,i)=>{
        const f=TOTAL_FLOORS-i, cur=f===floor, done=f<floor;
        const jk=JACKPOT_FLOORS.has(f), safe=f<=SAFE_FLOORS;
        return (
          <div key={f} ref={cur?ref:null} className={!cur?"jdf":""} onClick={()=>!cur&&onDevJump(f)}
            style={{
              width:36,height:19,flexShrink:0,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:jk?11:9,fontWeight:cur?900:600,
              background:cur?(jk?"#f59e0b":"#d97706"):done?"#14532d":jk?"rgba(251,191,36,.18)":safe?"rgba(52,211,153,.08)":"rgba(255,255,255,.05)",
              border:cur?"2px solid #fbbf24":jk?"1px solid rgba(251,191,36,.4)":safe?"1px solid rgba(52,211,153,.2)":"1px solid rgba(255,255,255,.07)",
              color:cur?"#1c0a00":done?"#86efac":jk?"#fbbf24":safe?"#6ee7b7":"rgba(255,255,255,.37)",
              boxShadow:cur?"0 0 8px #f59e0b80":jk?"0 0 4px rgba(251,191,36,.2)":"none",
            }}>
            {done?"✓":jk?"⭐":f}
          </div>
        );
      })}
      <div style={{fontSize:7,color:"rgba(255,255,255,.17)",marginTop:2}}>1</div>
    </div>
  );
}

// ─── PLAY SCREEN ──────────────────────────────────────────────────────────────

function PlayScreen({ floor,cards,phase,flipping,revealed,chosenIndex,collected,jackpotCards,peekUsed,peekMode,peekedIndex,onPeek,onPick,onCashOut,onDevJump }) {
  const isJ    = JACKPOT_FLOORS.has(floor);
  const isSafe = floor <= SAFE_FLOORS;
  const sk     = skulls(floor);
  const jj     = JJ(floor);
  const nextF  = floor + 1;
  const nextIsJ    = JACKPOT_FLOORS.has(nextF);
  const nextMoreSk = skulls(nextF) > sk;
  const showingMisses = phase==="revealed" && revealed.length===4;
  const flipping_ = phase==="flipping";

  return (
    <div style={{
      flex:1,display:"flex",flexDirection:"column",
      background:isJ?"linear-gradient(180deg,#1a1000,#2d2200)":isSafe?"linear-gradient(180deg,#001a08,#0d2d14)":"linear-gradient(180deg,#1c0a00,#2d1200)",
      position:"relative",
    }}>
      {isJ   && <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 0%,rgba(251,191,36,.1) 0%,transparent 55%)",pointerEvents:"none",zIndex:0}}/>}
      {isSafe && <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 0%,rgba(52,211,153,.07) 0%,transparent 60%)",pointerEvents:"none",zIndex:0}}/>}

      {/* Header */}
      <div style={{
        background:"rgba(0,0,0,.58)",
        borderBottom:`2px solid ${isJ?"#f59e0b":isSafe?"rgba(52,211,153,.45)":"rgba(251,191,36,.15)"}`,
        padding:"10px 12px 8px",display:"flex",alignItems:"center",justifyContent:"space-between",
        position:"relative",zIndex:2,
        boxShadow:isJ?"0 2px 20px rgba(251,191,36,.22)":isSafe?"0 2px 12px rgba(52,211,153,.13)":"none",
      }} className={isSafe?"jsb":""}>
        <div>
          <div style={{fontSize:9,color:"rgba(255,255,255,.38)",fontWeight:900,letterSpacing:".13em"}}>FLOOR</div>
          <div className="jf" style={{fontSize:36,lineHeight:1,color:isJ?"#fbbf24":isSafe?"#6ee7b7":"#fde68a",textShadow:isJ?"0 0 18px rgba(251,191,36,.8)":isSafe?"0 0 12px rgba(52,211,153,.55)":"none"}}>{floor}</div>
          {isJ   && <div style={{fontSize:9,fontWeight:900,color:"#f59e0b",letterSpacing:".14em",animation:"Kbnc 1s ease-in-out infinite"}}>⭐ JACKPOT ⭐</div>}
          {isSafe && <div style={{fontSize:9,fontWeight:900,color:"#34d399",letterSpacing:".1em"}}>🛡️ SAFE</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div className="jbnc" style={{fontSize:36}}>{jj.face}</div>
          <div style={{background:jj.bg,borderRadius:20,padding:"3px 9px",fontSize:10,fontWeight:700,color:"#fff",maxWidth:115,textAlign:"center",lineHeight:1.3}}>{jj.msg}</div>
        </div>
        <div style={{textAlign:"right",minWidth:56}}>
          {nextF<=TOTAL_FLOORS ? (
            <>
              <div style={{fontSize:9,color:"rgba(255,255,255,.3)",fontWeight:900,letterSpacing:".1em"}}>NEXT</div>
              <div className="jf" style={{fontSize:22,color:"rgba(255,255,255,.5)",lineHeight:1}}>{nextF}</div>
              <div style={{fontSize:9,color:nextIsJ?"#fbbf24":nextMoreSk?"#fca5a5":isSafe&&nextF>SAFE_FLOORS?"#fca5a5":"rgba(255,255,255,.3)"}}>
                {nextIsJ?"⭐ jackpot":nextMoreSk?"💀 +skull":isSafe&&nextF>SAFE_FLOORS?"⚠️ danger":"→"}
              </div>
            </>
          ) : <div style={{fontSize:9,color:"#fbbf24",fontWeight:900}}>SUMMIT</div>}
        </div>
      </div>

      {/* Zone bar */}
      {isSafe ? (
        <div style={{background:"rgba(5,46,22,.65)",borderBottom:"2px solid rgba(52,211,153,.38)",padding:"5px 12px",display:"flex",alignItems:"center",gap:7,position:"relative",zIndex:2}}>
          <span style={{fontSize:13}}>🛡️</span>
          <span style={{fontSize:11,color:"#34d399",fontWeight:900}}>SAFE ZONE — No skulls on floors 1–{SAFE_FLOORS}</span>
          <span style={{marginLeft:"auto",fontSize:10,color:"rgba(52,211,153,.4)"}}>{floor}/{SAFE_FLOORS}</span>
        </div>
      ) : sk>0 ? (
        <div style={{background:`rgba(127,29,29,${.14+Math.min(.4,(floor-5)/25*.4)})`,borderBottom:"1px solid rgba(239,68,68,.2)",padding:"5px 12px",display:"flex",alignItems:"center",gap:6,position:"relative",zIndex:2}}>
          {Array.from({length:sk},(_,i)=><span key={i} style={{fontSize:13}}>💀</span>)}
          <span style={{fontSize:11,color:"#fca5a5",fontWeight:700}}>{sk} skull{sk>1?"s":""} hidden — {4-sk}/4 chests safe</span>
        </div>
      ) : null}

      {/* Body */}
      <div style={{flex:1,display:"flex",overflow:"hidden",position:"relative",zIndex:1,minHeight:0}}>
        <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden"}}>

          {/* Loot cartridge */}
          <LootCartridge collected={collected}/>

          <div style={{flex:1,padding:"12px 12px 0",display:"flex",flexDirection:"column",gap:10}}>

            {/* Card grid */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {cards.map((card,i)=>{
                const isRev    = revealed.includes(i);
                const isChosen = i===chosenIndex && isRev;
                const isMissed = isRev && i!==chosenIndex;
                const isPeeked_ = i===peekedIndex && !isRev;
                return (
                  <ChestCard key={i} card={card}
                    isRevealed={isRev}
                    isFlipping={flipping===i}
                    isOff={flipping_ && flipping!==i}
                    isChosen={isChosen}
                    isMissed={isMissed}
                    isPeeked={isPeeked_}
                    onClick={()=>onPick(i)}
                  />
                );
              })}
            </div>

            {/* Prompt */}
            <div style={{textAlign:"center",fontSize:12,fontWeight:600,padding:"2px 0",color:showingMisses?"rgba(255,255,255,.25)":"rgba(255,255,255,.38)",transition:"color .4s"}}>
              {showingMisses
                ? <span className="jplse">advancing…</span>
                : isJ ? "⭐ Pick a JACKPOT card!"
                : isSafe ? "🛡️ Pick any card — safe zone!"
                : "Tap a card to reveal it"}
            </div>

            {/* Peek button */}
            {phase==="choose" && !peekUsed && peekedIndex===null && !peekMode && (
              <button className="jbtn" onClick={onPeek} style={{
                width:"100%",background:"rgba(6,182,212,.1)",
                border:"1px solid rgba(6,182,212,.4)",borderRadius:10,
                color:"#67e8f9",fontSize:13,fontWeight:700,
                padding:"9px 14px",letterSpacing:".02em",
                display:"flex",alignItems:"center",justifyContent:"center",gap:7,
              }}>
                <span>👁️</span> Peek at one card — $0.49
              </button>
            )}
            {peekMode && (
              <div style={{textAlign:"center",fontSize:11,color:"#67e8f9",fontWeight:700,padding:"4px 0",animation:"Kpulse 1s ease-in-out infinite"}}>
                👁️ Tap any card to peek at it
              </div>
            )}

            {/* Jackpot teaser — between prompt and leave tower */}
            <JackpotTeaser floor={floor} jackpotCards={jackpotCards}/>

            {/* Leave tower */}
            <div style={{paddingTop:4,paddingBottom:8}}>
              <button className="jbtn" onClick={onCashOut} disabled={flipping_}
                style={{
                  width:"100%",
                  background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.15)",
                  borderRadius:12,
                  color:collected.length>0?"rgba(255,255,255,.72)":"rgba(255,255,255,.3)",
                  fontSize:14,fontWeight:700,padding:"13px 16px",letterSpacing:".02em",
                  opacity:flipping_?.3:1,transition:"opacity .3s",
                  cursor:flipping_?"default":"pointer",
                }}>
                {collected.length>0
                  ? `🚪 Leave tower — take your ${collected.length} reward${collected.length!==1?"s":""}`
                  : "🚪 Leave tower"}
              </button>
            </div>
          </div>
        </div>

        <TowerBar floor={floor} onDevJump={onDevJump}/>
      </div>
    </div>
  );
}

  return (
    <div style={{flex:1,background:"linear-gradient(180deg,#3b0707 0%,#7f1d1d 45%,#450a0a 100%)",display:"flex",flexDirection:"column",alignItems:"center",padding:"0 16px 28px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 35%,rgba(239,68,68,.18) 0%,transparent 65%)",pointerEvents:"none"}}/>
      <div className="jskp" style={{marginTop:44,fontSize:100,filter:"drop-shadow(0 0 28px #ef4444)",marginBottom:6}}>💀</div>
      <div className="jf jp" style={{fontSize:42,color:"#fca5a5",textShadow:"0 0 24px rgba(239,68,68,.8)",marginBottom:4,letterSpacing:".05em",animationDelay:".2s"}}>OH NO!</div>
      <div style={{fontSize:14,color:"#fecaca",fontWeight:600,marginBottom:12,textAlign:"center",animation:"Kpop .4s ease .38s both"}}>JooJoo hit a skull on Floor {floor}!</div>
      {collected.length>0 && (
        <div style={{background:"rgba(127,29,29,.5)",border:"1px solid rgba(239,68,68,.48)",borderRadius:12,padding:"10px 14px",marginBottom:14,width:"100%",animation:"Kpop .4s ease .5s both"}}>
          <div style={{fontSize:10,color:"#fca5a5",fontWeight:900,letterSpacing:".12em",marginBottom:8}}>⚠️ THESE ARE AT RISK:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {Object.entries(groups).map(([key,g])=>(
              <div key={key} style={{background:"rgba(0,0,0,.4)",border:`1px solid ${g.col}55`,borderRadius:8,padding:"5px 9px",display:"flex",alignItems:"center",gap:5}}>
                <div style={{background:"#000",borderRadius:6,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
                  <RewardImg rkey={key} size={26}/>
                </div>
                {g.count>1 && <span className="jf" style={{fontSize:13,color:g.col}}>×{g.count}</span>}
                <span style={{fontSize:9,color:g.col,fontWeight:700}}>{g.label}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      {show && reviveCount < 2 && (
        <div className="jup" style={{width:"100%",display:"flex",flexDirection:"column",gap:10}}>
          <div style={{textAlign:"center",fontSize:12,color:"#fde68a",fontWeight:700,marginBottom:2}}>
            {reviveCount===0 ? "🐵 JooJoo can save you!" : "⚠️ Last chance to save your run!"}
          </div>
          {reviveCount===0 && (!watchingAd ? (
            <div className="jrv" onClick={onWatchAd} style={{background:"linear-gradient(135deg,#1e3a8a,#1d4ed8)",border:"2px solid #3b82f6",padding:"13px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 0 20px rgba(59,130,246,.4)"}}>
              <span style={{fontSize:28}}>📺</span>
              <div>
                <div style={{fontSize:16,fontWeight:900,color:"#fff",fontFamily:"'Fredoka One',sans-serif"}}>WATCH FREE AD</div>
                <div style={{fontSize:11,color:"#93c5fd"}}>Continue — keep everything</div>
              </div>
            </div>
          ) : (
            <div style={{background:"rgba(29,78,216,.18)",border:"2px solid #3b82f6",borderRadius:14,padding:"13px 16px"}}>
              <div style={{textAlign:"center",fontSize:12,color:"#93c5fd",marginBottom:7}}>📺 Ad playing…</div>
              <div style={{background:"rgba(0,0,0,.35)",borderRadius:8,height:11,overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:8,background:"linear-gradient(90deg,#3b82f6,#60a5fa)",width:`${adProgress}%`,transition:"width .1s linear"}}/>
              </div>
              <div style={{textAlign:"center",fontSize:11,color:"#93c5fd",marginTop:5}}>{Math.round(adProgress)}% complete</div>
            </div>
          ))}
          <div className="jrv" onClick={onPay} style={{
            background: reviveCount===0 ? "linear-gradient(135deg,#92400e,#d97706)" : "linear-gradient(135deg,#7f1d1d,#b91c1c)",
            border: reviveCount===0 ? "2px solid #fbbf24" : "2px solid #ef4444",
            padding:"13px 16px",display:"flex",alignItems:"center",gap:12,
            boxShadow: reviveCount===0 ? "0 0 14px rgba(251,191,36,.3)" : "0 0 14px rgba(239,68,68,.4)",
          }}>
            <span style={{fontSize:28}}>💎</span>
            <div>
              <div style={{fontSize:16,fontWeight:900,color: reviveCount===0 ? "#1c0a00" : "#fff",fontFamily:"'Fredoka One',sans-serif"}}>
                {reviveCount===0 ? "REVIVE FOR $0.99" : "LAST REVIVE — $1.99"}
              </div>
              <div style={{fontSize:11,color: reviveCount===0 ? "#92400e" : "#fca5a5",fontWeight:700}}>
                {reviveCount===0 ? "Continue instantly · One more revive available" : "Final chance · No more revives after this"}
              </div>
            </div>
          </div>
        </div>
      )}
      {show && (
        <button className="jbtn" onClick={onQuit} style={{
          background:"rgba(0,0,0,.55)",border:"1px solid rgba(255,255,255,.2)",
          color:"rgba(255,255,255,.75)",fontSize:13,fontWeight:700,
          padding:"13px",borderRadius:10,marginTop:10,width:"100%",
          animation:"Kup .3s ease .2s both",
        }}>Abandon run — lose all rewards</button>
      )}
    </div>
  );
}

// ─── SUMMARY SCREEN ───────────────────────────────────────────────────────────

function SummaryScreen({ collected,floor,endReason,lostCollected,onReplay }) {
  const cleared=endReason==="complete", wasSkull=endReason==="skull";
  const groups=groupLoot(wasSkull?lostCollected:collected);
  return (
    <div style={{flex:1,background:"linear-gradient(180deg,#0c0500 0%,#1c0a00 40%,#2d1200 100%)",display:"flex",flexDirection:"column",alignItems:"center",padding:"36px 16px 28px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 20%,rgba(251,191,36,.08) 0%,transparent 55%)",pointerEvents:"none"}}/>
      <div className="jf jp" style={{fontSize:cleared?30:22,color:wasSkull?"#ef4444":"#fbbf24",textAlign:"center",marginBottom:4,textShadow:wasSkull?"0 0 24px rgba(239,68,68,.6)":"0 0 28px rgba(251,191,36,.6)"}}>
        {cleared?"🏆 TOWER CLEARED!":wasSkull?`💀 SKULL — FLOOR ${floor}`:`CASHED OUT · FLOOR ${floor}`}
      </div>
      <div className="jflt" style={{fontSize:64,margin:"10px 0"}}>{cleared?"🐵👑":wasSkull?"💀":collected.length>0?"🐵💰":"🐵"}</div>
      {Object.keys(groups).length>0 && (
        <div style={{width:"100%",maxWidth:380,background:wasSkull?"rgba(127,29,29,.4)":"rgba(0,0,0,.35)",border:wasSkull?"1px solid rgba(239,68,68,.35)":"1px solid rgba(251,191,36,.15)",borderRadius:14,padding:"12px 14px",marginBottom:18,animation:"Kpop .5s ease .2s both"}}>
          <div style={{fontSize:10,color:wasSkull?"#fca5a5":"#f59e0b",fontWeight:900,letterSpacing:".12em",marginBottom:10}}>{wasSkull?"💀 LOST REWARDS":"🎁 REWARDS COLLECTED"}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {Object.entries(groups).map(([key,g])=>(
              <div key={key} style={{background:`${g.col}18`,border:`1px solid ${g.col}55`,borderRadius:10,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}}>
                <div style={{background:"#000",borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}}>
                  <RewardImg rkey={key} size={34}/>
                </div>
                <div>
                  <div style={{fontSize:12,color:"#fff",fontWeight:700}}>{g.label}</div>
                  {g.count>1 && <div className="jf" style={{fontSize:14,color:g.col}}>×{g.count}</div>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      {!wasSkull && collected.length===0 && <div style={{color:"rgba(255,255,255,.3)",fontSize:14,marginBottom:18,textAlign:"center"}}>No rewards collected. Try again!</div>}
      <button className="jbtn jgl" onClick={onReplay} style={{background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#1c0a00",fontSize:22,fontWeight:900,padding:"14px 40px",borderRadius:14,letterSpacing:".04em",marginBottom:12,animation:"Kpop .5s ease .4s both"}}>
        🔄 PLAY AGAIN
      </button>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────

function MonkeyTower() {
  const [screen,   setScreen]   = useState("entry");
  const [floor,    setFloor]    = useState(1);
  const [cards,    setCards]    = useState([]);
  const [revealed, setRevealed] = useState([]);
  const [flipping, setFlipping] = useState(null);
  const [phase,    setPhase]    = useState("choose");
  const [chosenIndex,   setChosenIndex]   = useState(null);
  const [collected,     setCollected]     = useState([]);
  const [reviveCount,   setReviveCount]   = useState(0);
  const [peekUsed,      setPeekUsed]      = useState(false);
  const [peekMode,      setPeekMode]      = useState(false);
  const [peekedIndex,   setPeekedIndex]   = useState(null);
  const [watchingAd,    setWatchingAd]    = useState(false);
  const [adProgress,    setAdProgress]    = useState(0);
  const [endReason,     setEndReason]     = useState("cashout");
  const [lostCollected, setLostCollected] = useState([]);
  const adRef           = useRef(null);
  const jackpotCardsRef = useRef({});
  const [jackpotCards, setJackpotCards] = useState({});
  const t1Ref      = useRef(null);
  const t2Ref      = useRef(null);
  const t3Ref      = useRef(null);

  const clearTimers = () => { clearTimeout(t1Ref.current); clearTimeout(t2Ref.current); clearTimeout(t3Ref.current); };

  const goFloor = useCallback(f => {
    setFloor(f);
    const jc = jackpotCardsRef.current;
    setCards(jc[f] ? jc[f] : buildCards(f));
    setRevealed([]); setFlipping(null);
    setPhase("choose"); setChosenIndex(null);
    setPeekMode(false); setPeekedIndex(null);
  }, []);

  const startGame = useCallback(() => {
    clearTimers();
    setCollected([]); setReviveCount(0);
    setPeekUsed(false); setPeekMode(false); setPeekedIndex(null);
    setWatchingAd(false); setAdProgress(0);
    setLostCollected([]); setEndReason("cashout");
    const jc = pregenJackpots(1);
    jackpotCardsRef.current = jc;
    setJackpotCards(jc);
    goFloor(1); setScreen("playing");
  }, [goFloor]);

  const devJump = useCallback(targetFloor => {
    clearTimers();
    const sim = [];
    for (let f=1; f<targetFloor; f++) {
      const j=JACKPOT_FLOORS.has(f), k=pick(POOL(f,j));
      sim.push({...REWARDS[k],key:k,floor:f});
    }
    setCollected(sim); setReviveCount(0);
    setPeekUsed(false); setPeekMode(false); setPeekedIndex(null);
    setLostCollected([]); setEndReason("cashout");
    const jc = pregenJackpots(targetFloor);
    jackpotCardsRef.current = jc;
    setJackpotCards(jc);
    goFloor(targetFloor); setScreen("playing");
  }, [goFloor]);

  const handlePick = useCallback(i => {
    if (peekMode) { setPeekedIndex(i); setPeekMode(false); return; }
    if (phase!=="choose" || flipping!==null) return;
    setFlipping(i); setPhase("flipping"); setChosenIndex(i);

    // T1: flip done — reveal chosen card, add to loot
    t1Ref.current = setTimeout(()=>{
      const card=cards[i];
      setRevealed([i]); setFlipping(null);
      if (card.type==="skull") {
        setPhase("skull");
        t2Ref.current=setTimeout(()=>setScreen("skull"),440);
      } else {
        setCollected(c=>[...c,{...REWARDS[card.key],key:card.key,floor}]);
        setPhase("revealed");
        // T2: reveal remaining cards (FOMO)
        t2Ref.current=setTimeout(()=>setRevealed([0,1,2,3]),250);
        // T3: advance to next floor
        t3Ref.current=setTimeout(()=>{
          const next=floor+1;
          if (next>TOTAL_FLOORS){setEndReason("complete");setScreen("summary");}
          else goFloor(next);
        }, 2700);
      }
    }, 480);
  }, [phase,flipping,cards,floor,goFloor]);

  const handleCashOut = useCallback(()=>{
    clearTimers();
    setEndReason("cashout"); setScreen("summary");
  }, []);

  const handleWatchAd = useCallback(()=>{
    setWatchingAd(true); setAdProgress(0);
    let p=0;
    adRef.current=setInterval(()=>{
      p+=100/30;
      const cp=Math.min(100,p);
      setAdProgress(cp);
      if (cp>=100){
        clearInterval(adRef.current);
        setWatchingAd(false); setReviveCount(c=>c+1);
        goFloor(floor); setScreen("playing");
      }
    },100);
  },[floor,goFloor]);

  const handlePay = useCallback(()=>{
    setReviveCount(c=>c+1); goFloor(floor); setScreen("playing");
  },[floor,goFloor]);

  const handleQuit = useCallback(()=>{
    if (adRef.current) clearInterval(adRef.current);
    setLostCollected(collected);
    setCollected([]); setEndReason("skull"); setScreen("summary");
  },[collected]);

  useEffect(()=>{
    const el=document.createElement("style");
    el.textContent=CSS;
    document.head.appendChild(el);
    return()=>el.remove();
  },[]);

  return (
    <div className="jt">
      <div className="jt-g">
        {screen==="entry"   && <EntryScreen onStart={startGame}/>}
        {screen==="playing" && <PlayScreen floor={floor} cards={cards} phase={phase} flipping={flipping} revealed={revealed} chosenIndex={chosenIndex} collected={collected} jackpotCards={jackpotCards} peekUsed={peekUsed} peekMode={peekMode} peekedIndex={peekedIndex} onPeek={()=>{setPeekUsed(true);setPeekMode(true);}} onPick={handlePick} onCashOut={handleCashOut} onDevJump={devJump}/>}
        {screen==="skull"   && <SkullScreen floor={floor} collected={collected} reviveCount={reviveCount} watchingAd={watchingAd} adProgress={adProgress} onWatchAd={handleWatchAd} onPay={handlePay} onQuit={handleQuit}/>}
        {screen==="summary" && <SummaryScreen collected={collected} floor={floor} endReason={endReason} lostCollected={lostCollected} onReplay={()=>setScreen("entry")}/>}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<MonkeyTower/>);
  </script>
</body>
